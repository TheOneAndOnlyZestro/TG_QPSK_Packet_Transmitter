# radio.conf
[Hardware]
# Leave empty or comment out to auto-detect, or provide exact serials
tx_serial = 0000000000000000f77c60dc29417dc3
rx_serial = 000000000000000075b068dc30792007

[RF_Settings]
frequency = 2300000000
# Sample rate in Hz (2e6 = 2000000)
sample_rate = 2000000
# Equivalent to baud_rate
samples_per_symbol = 50
# Gains
tx_gain = 30
rx_gain = 20
# Chunk Size
chunk_size = 2048
capture_seconds = 2
timeout = 10
max_resend = 5
modulation_method = OFDM
trans_count = 5